services:
  # Django Backend Web Service
  - type: web
    name: snaply-backend
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        value: "YOUR_GEMINI_API_KEY_HERE"

  # Vite Frontend Static Site
  - type: static
    name: snaply-frontend
    rootDir: frontend
    buildCommand: "npm run build"
    publishPath: "frontend/dist"
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://snaply-backend.onrender.com"
