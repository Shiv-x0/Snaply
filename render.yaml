services:
  # Django Backend Web Service
  - type: web
    name: snaply-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false

  # Vite Frontend Static Site
  - type: web
    name: snaply-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm run build"
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://snaply-backend.onrender.com"
